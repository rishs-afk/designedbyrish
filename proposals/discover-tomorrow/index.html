    <meta charset="UTF-8" />

    <style>
      * {
        cursor: none !important;
      }

      #grain {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 99999;
        opacity: 0.08;
        mix-blend-mode: overlay;
      }

      .hidden {
        display: none !important;
      }

      #robot-shadow {
        position: fixed;
        width: 50px;
        height: 16px;
        background: rgba(0, 0, 0, 0.15);
        border-radius: 50%;
        filter: blur(7px);
        pointer-events: none;
        z-index: 9997;
        transform: translate(-50%, -50%);
      }

      #robot-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 105px;
        height: 105px;
        pointer-events: none;
        z-index: 10001;
        margin-left: -52px;
        margin-top: -52px;
        will-change: transform;
      }

      .robot-body-wrapper {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .antenna-base {
        position: absolute;
        top: -10px;
        left: 50%;
        margin-left: -2px;
        width: 3px;
        height: 20px;
        background: #f5bc02;
        transform-origin: bottom center;
        z-index: 1;
      }

      .antenna-tip {
        position: absolute;
        top: -5px;
        left: -3px;
        width: 9px;
        height: 9px;
        background: #f5bc02;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      }

      .ear {
        position: absolute;
        width: 13px;
        height: 28px;
        background: #f5bc02;
        border-radius: 8px;
        z-index: 1;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .ear-l {
        left: -4px;
        top: 28px;
        transform-origin: right center;
      }

      .ear-r {
        right: -4px;
        top: 28px;
        transform-origin: left center;
      }

      .robot-head {
        position: relative;
        width: 82px;
        height: 82px;
        perspective: 700px;
        z-index: 10;
      }

      .head-casing {
        position: absolute;
        inset: 0;
        border-radius: 26px;
        background: #f5bc02;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 -5px 7px rgba(0, 0, 0, 0.12), inset 0 3px 5px rgba(255, 240, 100, 0.9), 0 12px 28px rgba(0, 0, 0, 0.3);
        padding: 10px;
        box-sizing: border-box;
        z-index: 5;
      }

      .screen-face {
        width: 100%;
        height: 100%;
        background: #080808;
        border-radius: 16px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        box-shadow: inset 0 0 12px rgba(0, 0, 0, 1);
        border: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 6;
      }

      .glitch-active {
        animation: glitch-shake 0.15s infinite;
      }

      @keyframes glitch-shake {
        0% {
          transform: translate(0);
        }

        20% {
          transform: translate(-2px, 2px);
        }

        40% {
          transform: translate(-2px, -2px);
        }

        60% {
          transform: translate(2px, 2px);
        }

        80% {
          transform: translate(2px, -2px);
        }

        100% {
          transform: translate(0);
        }
      }

      .screen-fx-overlay {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 80%);
        background-size: 100% 4px, 100% 100%;
      }

      #scan-line {
        position: absolute;
        top: -10px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #fca103;
        box-shadow: 0 0 10px #fca103;
        opacity: 0;
        z-index: 6;
      }

      .is-scanning #scan-line {
        animation: scan-move 1.5s linear infinite;
        opacity: 0.5;
      }

      @keyframes scan-move {
        0% {
          top: -10%;
        }

        100% {
          top: 110%;
        }
      }

      #boot-text {
        color: #fca103;
        font-family: 'JetBrains Mono', monospace;
        font-size: 7px;
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 40;
        opacity: 0;
      }

      .expression-container {
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 30;
        margin-top: -8px;
        transition: opacity 0.15s ease, transform 0.1s ease-out;
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        width: 100%;
        height: 33px;
      }

      .eyes-container {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 100%;
        transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .eye {
        width: 11px;
        height: 20px;
        background-color: #ffffff;
        border-radius: 8px;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
        position: relative;
      }

      .is-clicked .eyes-container {
        gap: 0;
      }

      .is-clicked .eye {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background-color: transparent;
        border: 3px solid #ffffff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.4);
        margin-top: 8px;
      }

      .is-clicked #eye-r {
        width: 0;
        height: 0;
        border: none;
        opacity: 0;
      }

      .face-happy .eye {
        border-radius: 50% 50% 20% 20%;
        height: 14px;
      }

      .face-neutral .eye {
        border-radius: 8px;
        height: 20px;
      }

      .face-focus .eye {
        height: 26px;
        width: 13px;
        border-radius: 9px;
      }

      .face-sleep .eye {
        height: 5px !important;
        width: 18px;
        border-radius: 3px;
        opacity: 0.7;
        margin-top: 5px;
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
      }

      .blink .eye {
        height: 2px !important;
        border-radius: 1px;
        margin-top: 9px;
      }

      .screen-text {
        position: absolute;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #ffffff;
        font-weight: 700;
        opacity: 0;
        z-index: 35;
        text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        text-align: center;
        width: 100%;
      }

      .screen-text.active {
        opacity: 1;
      }

      .screen-icon {
        position: absolute;
        z-index: 35;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease;
      }

      .screen-face.mode-pointer #screen-pointer {
        opacity: 1;
      }

      .screen-face.mode-type #screen-type {
        opacity: 1;
      }

      .type-bar {
        display: block;
        width: 2px;
        height: 20px;
        background: #ffffff;
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        border-radius: 1px;
        animation: type-blink 1s step-end infinite;
      }

      @keyframes type-blink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      @media (max-width: 1024px), (pointer: coarse) {
        * {
          cursor: auto !important;
        }

        #robot-cursor,
        #robot-shadow {
          display: none;
        }
      }
    </style>
  </head>

                      <p className="text-[10px] font-bold text-[#F1F0EA]/60 uppercase tracking-widest mb-1">Milestone 02 / Completion</p>
                      <p className="text-4xl md:text-6xl font-brutal">₹1,50,000</p>

                    <BrutalArrow className="w-12 md:w-20 text-[#171717]" />

              <CardFooter page="13" sectionName="Investment" theme="light" clientName={clientName} />
            </section>

            <section className="sticky top-0 h-screen w-full bg-[#F1F0EA] z-50 flex flex-col justify-center p-8 md:p-16 border-t-8 border-[#171717] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
              <div className="w-full max-w-5xl mx-auto">
                <h2 className="text-[#DF2921] text-6xl md:text-[8vw] font-brutal uppercase tracking-tighter mb-12 leading-none">Next Steps</h2>
                <div className="space-y-6 md:space-y-8">
                  {[
                    "Review the proposal and investment structure",
                    "Schedule a quick alignment call to finalize scope",
                    "50k Upfront deposit to secure the timeline",
                    "Project kickoff and branding discovery phase",
                  ].map((step, i) => (
                    <div key={i} className="flex items-center gap-6 group cursor-default">
                      <span className="text-4xl md:text-6xl font-brutal text-[#171717] opacity-20 group-hover:opacity-100 group-hover:text-[#DF2921] transition-all">
                        {i + 1}
                      </span>
                      <p className="text-xl md:text-4xl font-bold uppercase text-[#171717] group-hover:translate-x-4 transition-transform duration-300">
                        {step}
                      </p>
                    </div>
                  ))}
                </div>
              </div>
              <CardFooter page="18" sectionName="Next Steps" theme="dark" clientName={clientName} />
            </section>

            <section className="sticky top-0 h-screen w-full bg-[#DF2921] z-[60] flex items-center justify-center p-6 md:p-16 border-t-8 border-[#171717] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
              <div className="w-full text-center max-w-6xl">
                <h1 className="text-[12vw] md:text-[11vw] leading-[0.8] font-brutal uppercase tracking-tighter text-[#171717] break-words">
                  Let's Create
                  <br />
                  Something
                  <br />
                  <span className="text-[#F1F0EA] italic">Special</span>
                  <br />
                  Together
                </h1>
                <div className="mt-12 flex justify-center">
                  <div className="px-10 py-5 bg-[#171717] text-[#F1F0EA] font-brutal uppercase text-xl md:text-3xl rounded-full transform hover:scale-110 active:scale-95 transition-all cursor-pointer shadow-2xl">
                    Get Started
                  </div>
                </div>
              </div>
              <CardFooter page="20" sectionName="Contact" theme="dark" clientName={clientName} />
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    <script>
      (function () {
        const canvas = document.getElementById("grain");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        let width = 0;
        let height = 0;
        let frame = 0;
        function resize() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);
        (function tick() {
          requestAnimationFrame(tick);
          if (++frame % 3) return;
          if (!width || !height) return;
          const img = ctx.createImageData(width, height);
          const data = img.data;
          for (let index = 0; index < data.length; index += 4) {
            const value = (Math.random() * 255) | 0;
            data[index] = data[index + 1] = data[index + 2] = value;
            data[index + 3] = 255;
          }
          ctx.putImageData(img, 0, 0);
        })();
      })();

      (function () {
        const cursor = document.getElementById("robot-cursor");
        const shadow = document.getElementById("robot-shadow");
        const head = document.getElementById("head");
        const bodyWrapper = document.getElementById("body-wrapper");
        const faceScreen = document.getElementById("face-screen");
        const antenna = document.getElementById("antenna");
        const earL = document.getElementById("ear-l");
        const earR = document.getElementById("ear-r");
        const expContainer = document.getElementById("exp-container");
        const bootText = document.getElementById("boot-text");
        const screenMsg = document.getElementById("screen-msg");
        if (!cursor || !shadow || !head || !bodyWrapper || !faceScreen || !antenna || !earL || !earR || !expContainer || !bootText || !screenMsg) return;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let rigidX = mouseX;
        let rigidY = mouseY;
        let innerX = 0;
        let innerY = 0;
        let velX = 0;
        let velY = 0;
        let lastMoveTime = Date.now();
        let isOverriding = false;
        let isBooting = true;
        let screenMode = "normal";
        let currentTarget = null;

        const faces = ["face-happy", "face-neutral", "face-sleep", "face-focus"];

        function setExpression(faceClass, override = false) {
          if (override) isOverriding = true;
          faces.forEach((face) => expContainer.classList.remove(face));
          expContainer.classList.add(faceClass);
        }

        function showEyes() {
          expContainer.classList.remove("hidden");
          faceScreen.classList.remove("mode-pointer", "mode-type");
          screenMsg.classList.remove("active");
          faceScreen.classList.remove("is-scanning");
          currentTarget = null;
        }

        function enterTextMode(message, target) {
          screenMode = "text";
          currentTarget = target ? target.getBoundingClientRect() : null;
          faceScreen.classList.add("is-scanning");
          faceScreen.classList.remove("mode-pointer", "mode-type");
          expContainer.classList.add("hidden");
          screenMsg.innerText = message;
          screenMsg.classList.add("active");
        }

        function exitTextMode() {
          screenMode = "normal";
          showEyes();
          setExpression("face-neutral");
        }

        function enterPointerMode() {
          if (screenMode === "text") return;
          screenMode = "pointer";
          expContainer.classList.add("hidden");
          screenMsg.classList.remove("active");
          faceScreen.classList.remove("mode-type");
          faceScreen.classList.add("mode-pointer");
        }

        function exitPointerMode() {
          if (screenMode !== "pointer") return;
          screenMode = "normal";
          showEyes();
          setExpression("face-neutral");
        }

        function enterTypeMode() {
          if (screenMode === "text") return;
          screenMode = "type";
          expContainer.classList.add("hidden");
          screenMsg.classList.remove("active");
          faceScreen.classList.remove("mode-pointer");
          faceScreen.classList.add("mode-type");
        }

        function exitTypeMode() {
          if (screenMode !== "type") return;
          screenMode = "normal";
          showEyes();
          setExpression("face-neutral");
        }

        function addRobotHover(selector, message) {
          document.querySelectorAll(selector).forEach((element) => {
            element.addEventListener("mouseenter", () => {
              if (isBooting) return;
              enterTextMode(message, element);
            });
            element.addEventListener("mouseleave", () => {
              if (isBooting) return;
              exitTextMode();
            });
          });
        }

        addRobotHover("#root section", "VIEW");

        const skipPointer = "#robot-cursor";

        document.addEventListener("mouseover", (event) => {
          if (isBooting) return;
          const element = event.target.closest("button, a[href], [role='button']");
          if (!element || element.closest(skipPointer)) return;
          enterPointerMode();
        });
        document.addEventListener("mouseout", (event) => {
          if (isBooting) return;
          const element = event.target.closest("button, a[href], [role='button']");
          if (!element || element.closest(skipPointer)) return;
          exitPointerMode();
        });

        document.addEventListener("mouseover", (event) => {
          if (isBooting) return;
          if (event.target.closest("input, textarea")) enterTypeMode();
        });
        document.addEventListener("mouseout", (event) => {
          if (isBooting) return;
          if (event.target.closest("input, textarea")) exitTypeMode();
        });

        window.addEventListener("mousedown", () => {
          if (isBooting) return;
          faceScreen.classList.add("is-clicked");
          bodyWrapper.style.transform = "scale(0.88) translateZ(-20px)";
          earL.style.transform = "translateX(-4px) rotate(-15deg)";
          earR.style.transform = "translateX(4px) rotate(15deg)";
        });

        window.addEventListener("mouseup", () => {
          faceScreen.classList.remove("is-clicked");
          bodyWrapper.style.transform = "";
          earL.style.transform = "";
          earR.style.transform = "";
        });

        document.addEventListener(
          "mousemove",
          (event) => {
            mouseX = event.clientX;
            mouseY = event.clientY;
            lastMoveTime = Date.now();
            if (screenMode === "normal" && !isOverriding && !isBooting) setExpression("face-neutral");
          },
          { passive: true }
        );

        function update() {
          rigidX += (mouseX - rigidX) * 0.16;
          rigidY += (mouseY - rigidY) * 0.16;
          cursor.style.transform = `translate3d(${rigidX}px, ${rigidY}px, 0)`;

          shadow.style.left = rigidX + "px";
          shadow.style.top = rigidY + 50 + "px";
          shadow.style.transform = `translate(-50%,-50%) scale(${1 - Math.abs(innerY) / 90})`;

          if (mouseX < 15 || mouseX > window.innerWidth - 15 || mouseY < 15 || mouseY > window.innerHeight - 15) {
            faceScreen.classList.add("glitch-active");
          } else {
            faceScreen.classList.remove("glitch-active");
          }

          const targetX = (mouseX - rigidX) * 0.25;
          const targetY = (mouseY - rigidY) * 0.25;
          velX += (targetX - innerX) * 0.15;
          velY += (targetY - innerY) * 0.15;
          velX *= 0.82;
          velY *= 0.82;
          innerX += velX;
          innerY += velY;

          const tiltX = velX * 1.6;
          const tiltY = velY * 1.6;
          head.style.transform = `translate3d(${innerX}px,${innerY}px,0) rotateX(${-tiltY}deg) rotateY(${tiltX}deg)`;
          antenna.style.transform = `rotateZ(${-tiltX * 1.3}deg) rotateX(${-tiltY}deg)`;

          let lookX = (mouseX - rigidX) * 0.18;
          let lookY = (mouseY - rigidY) * 0.18;

          if (currentTarget) {
            lookX = (currentTarget.left + currentTarget.width / 2 - rigidX) * 0.28;
            lookY = (currentTarget.top + currentTarget.height / 2 - rigidY) * 0.28;
            setExpression("face-focus");
          }

          if (Date.now() - lastMoveTime > 3500 && screenMode === "normal" && !isBooting) {
            const time = Date.now() * 0.001;
            lookX = Math.sin(time) * 14;
            lookY = Math.cos(time * 0.7) * 8;
            if (Date.now() - lastMoveTime > 10000) setExpression("face-sleep");
          }

          expContainer.style.transform = `translate3d(${lookX}px,${lookY}px,0)`;
          requestAnimationFrame(update);
        }

        function blink() {
          if (!isOverriding && !isBooting && screenMode === "normal" && (expContainer.classList.contains("face-neutral") || expContainer.classList.contains("face-focus"))) {
            expContainer.classList.add("blink");
            setTimeout(() => expContainer.classList.remove("blink"), 120);
          }
          setTimeout(blink, Math.random() * 4500 + 1500);
        }

        function runBootSequence() {
          bootText.style.opacity = 1;
          const lines = ["BOOT_V2.7", "LAYER_SYNC: OK", "READY."];
          let index = 0;
          const interval = setInterval(() => {
            bootText.innerHTML += lines[index] + "<br>";
            index++;
            if (index >= lines.length) {
              clearInterval(interval);
              setTimeout(() => {
                bootText.style.opacity = 0;
                expContainer.classList.remove("hidden");
                isBooting = false;
              }, 400);
            }
          }, 250);
        }

        runBootSequence();
        update();
        blink();
      })();
    </script>
  </body>
</html>
